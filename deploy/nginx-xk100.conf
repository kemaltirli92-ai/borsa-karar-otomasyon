# XK100 Borsa — nginx reverse proxy yapilandirmasi (BLOK 22)
# 80 -> 443 yonlendirme; 443'te TLS (Let's Encrypt) + /api + /health proxy
# + statik site (/var/www/xk100). <domain> deploy.sh tarafindan degistirilir.

server {
    listen 80;
    server_name <domain>;
    # HTTP gelen her sey HTTPS'e yonlenir
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name <domain>;

    # Let's Encrypt sertifikalari (certbot-https.sh ile uretilir)
    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Statik musteri sitesi
    root /var/www/xk100;
    index index.html;

    # API uclari -> yerel uvicorn/http.server backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Izleme ucu (auth'suz health)
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Statik dosyalar
    location / {
        try_files $uri $uri/ /index.html;
    }
}
